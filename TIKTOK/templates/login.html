<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok Dashboard Login</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#0b1220; color:#e5e7eb; margin:0; }
      .wrap { max-width:420px; margin:10vh auto; padding:24px; background:#111827; border:1px solid #1f2937; border-radius:12px; }
      h1 { margin-top:0; font-size:1.4rem; }
      label { display:block; margin:10px 0 6px; color:#9ca3af; }
      input { width:100%; padding:10px; border-radius:8px; border:1px solid #374151; background:#0f172a; color:#e5e7eb; }
      button { margin-top:14px; width:100%; padding:10px; border:0; border-radius:8px; background:#2563eb; color:#fff; font-weight:600; cursor:pointer; }
      .msg { margin-bottom:10px; color:#fca5a5; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>TikTok Project Login</h1>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="msg">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post" action="/login">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <button type="submit">Sign In</button>
      </form>
    </main>
  </body>
</html>
