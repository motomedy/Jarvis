<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>JARVIS</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#050508" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <canvas id="orb-canvas"></canvas>

    <!-- Minimal controls — top right -->
    <div id="controls">
      <button id="btn-mute" title="Mute/Unmute">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
      </button>
      <button id="btn-menu" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- Dropdown menu -->
    <div id="menu-dropdown" style="display:none">
      <button id="btn-settings">Settings</button>
      <button id="btn-test-voice">Test Voice</button>
      <button id="btn-restart">Restart Server</button>
      <button id="btn-fix-self">Fix Yourself</button>
    </div>

    <div id="chat-panel">
      <div id="chat-header">conversation</div>
      <div id="chat-log"></div>
    </div>

    <div id="status-text"></div>
    <div id="stt-source">stt: detecting...</div>
    <div id="jarvis-label">JARVIS</div>
    <div id="error-text"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
