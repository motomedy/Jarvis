<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>Calendar Dashboard</h1>
        <p>Live view for events, tasks, and reports.</p>
      </header>

      <section class="cards" id="stats"></section>

      <section class="panel">
        <h2>Upcoming Events</h2>
        <ul id="events"></ul>
      </section>

      <section class="panel">
        <h2>Open Tasks</h2>
        <ul id="tasks"></ul>
      </section>

      <section class="panel">
        <h2>Recent Reports</h2>
        <ul id="reports"></ul>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
